<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="geometricPrecision">
  <rect width="32" height="32" fill="#0A0A0A"/>
  <!-- Abstract chain-link / forward motion mark.
       Two offset parallelograms form an interlocking link that leans right (speed).
       Designed to read at 16px: solid silhouettes, no fine detail. -->
  <g fill="#E8A838">
    <path d="M5 10 L15 10 L13 22 L3 22 Z"/>
    <path d="M19 10 L29 10 L27 22 L17 22 Z"/>
  </g>
  <!-- Negative-space gap between links for the "link" cue -->
  <rect x="15" y="10" width="4" height="12" fill="#0A0A0A"/>
</svg>
