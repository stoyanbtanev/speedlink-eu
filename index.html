    <!-- Structured data: MovingCompany (logistics) + FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "MovingCompany",
      "@id": "https://speedlink-eu.vercel.app/#org",
      "name": "SpeedLink Logistics",
      "url": "https://speedlink-eu.vercel.app/",
      "logo": "https://speedlink-eu.vercel.app/images/logo.png",
      "image": "https://speedlink-eu.vercel.app/images/hero-1.jpg",
      "description": "Спедиция и логистика — сухопътен, морски и въздушен транспорт в 47 държави. Митническо представителство.",
      "telephone": "+359877404599",
      "email": "office@speedlink-eu.com",
      "priceRange": "$$",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "BG",
        "addressLocality": "София",
        "addressRegion": "София-град"
      },
      "areaServed": [
        { "@type": "Country", "name": "Bulgaria" },
        { "@type": "Place", "name": "European Union" },
        { "@type": "Place", "name": "Central Asia" }
      ],
      "serviceType": [
        "Full Truckload (FTL)",
        "Less than Truckload (LTL)",
        "Ocean Freight",
        "Air Freight",
        "Customs Clearance",
        "Warehousing"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+359877404599",
        "email": "office@speedlink-eu.com",
        "contactType": "customer service",
        "availableLanguage": ["Bulgarian", "English"]
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Как формирате цените?",
          "acceptedAnswer": { "@type": "Answer", "text": "Цената зависи от тегло, разстояние, вид на товара и актуални пазарни условия. Котировката е окончателна — без допълнителни такси след приемане." }
        },
        {
          "@type": "Question",
          "name": "Какви са стандартните транзитни срокове?",
          "acceptedAnswer": { "@type": "Answer", "text": "FTL в Европа: 2–5 дни. LTL с консолидация: 3–7 дни. Морски транспорт до Азия: 20–30 дни. Въздушен транспорт: 2–4 дни." }
        },
        {
          "@type": "Question",
          "name": "Предлагате ли товарна застраховка?",
          "acceptedAnswer": { "@type": "Answer", "text": "Да. Организираме пълно застрахователно покритие чрез лицензирани застрахователи. Застраховката може да бъде включена директно в офертата." }
        },
        {
          "@type": "Question",
          "name": "Кой отговаря за митническото оформяне?",
          "acceptedAnswer": { "@type": "Answer", "text": "Нашият екип поема целия процес — подаване на документи, тарифна класификация, координация с граничните власти." }
        },
        {
          "@type": "Question",
          "name": "Каква е разликата между FTL и LTL?",
          "acceptedAnswer": { "@type": "Answer", "text": "FTL (Full Truck Load) — целият камион е за вашия товар. LTL (Less Than Truck Load) — товарът се консолидира с други съвместими пратки, което намалява разходите." }
        }
      ]
    }
    </script>
